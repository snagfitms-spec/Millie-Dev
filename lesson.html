<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<link rel="stylesheet" href="style.css">

<style>
body { background:#0b0f17; color:white; font-family:Arial; }

.container { max-width:800px; margin:auto; padding:40px; }

.box { background:#111827; padding:20px; border-radius:12px; }

.code { background:#000; padding:10px; border-left:3px solid #38BDF8; margin-top:10px; }

.quiz { margin-top:20px; padding:15px; background:#1f2937; border-radius:10px; }

.option {
    padding:10px;
    margin:5px 0;
    background:#111827;
    cursor:pointer;
    border-radius:8px;
}

.option:hover { background:#38BDF8; }
</style>
</head>

<body>

<div class="container">

<h1 id="title">Loading...</h1>
<p id="meta"></p>

<div class="box" id="content"></div>

<div class="quiz" id="quizBox" style="display:none;">
    <h3>Quiz</h3>
    <div id="quiz"></div>
</div>

<button onclick="history.back()">Back</button>

</div>

<script src="coursesData.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const courseId = params.get("course");
const moduleId = params.get("module");
const lessonId = params.get("lesson");

const course = courses[courseId];
const module = course?.modules.find(m => m.id === moduleId);
const lesson = module?.lessons.find(l => l.id === lessonId);

if(!lesson){
    document.getElementById("title").innerText = "Lesson Not Found";
} else {

    document.getElementById("title").innerText = lesson.title;
    document.getElementById("meta").innerText =
        course.title + " → " + module.title;

    document.getElementById("content").innerHTML =
        lesson.content?.text || "";

    if(lesson.content?.code){
        document.getElementById("content").innerHTML +=
        `<div class="code">${lesson.content.code}</div>`;
    }

    if(lesson.quiz){
        const q = lesson.quiz;

        document.getElementById("quizBox").style.display = "block";

        const quiz = document.getElementById("quiz");

        quiz.innerHTML = `<p>${q.question}</p>`;

        q.options.forEach(opt => {

            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;

            div.onclick = () => {
                if(opt === q.answer){
                    div.style.background = "green";
                } else {
                    div.style.background = "red";
                }
            };

            quiz.appendChild(div);
        });
    }
}

</script>

</body>
</html>
