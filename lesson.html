<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson | MillieDev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar"><div class="logo">MillieDev</div></nav>

<div class="lesson-container">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <h1 class="lesson-title" id="title">Loading...</h1>
    <div class="lesson-meta" id="meta"></div>
    <div class="lesson-box" id="content">Loading content...</div>
    
    <div class="lesson-nav">
        <button onclick="prevLesson()">Previous</button>
        <button onclick="nextLesson()">Next</button>
    </div>
</div>

<script src="coursesData.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get("course");
    const lessonId = params.get("lesson");

    window.onload = () => {
        const course = window.courses?.[courseId];
        if (!course) return showError("Course not found");

        // Flatten all lessons into a single track
        let allLessons = [];
        course.modules.forEach(m => m.lessons.forEach(l => allLessons.push({...l, mId: m.id, mTitle: m.title})));
        
        const index = allLessons.findIndex(l => l.id === lessonId);
        if (index === -1) return showError("Lesson not found");

        const lesson = allLessons[index];

        // Render UI
        document.getElementById("title").innerText = lesson.title;
        document.getElementById("meta").innerText = `${course.title} → ${lesson.mTitle}`;
        document.getElementById("content").innerHTML = lesson.content?.text || "No content.";

        // Navigation Handlers
        window.nextLesson = () => index < allLessons.length - 1 ? 
            window.location.href = `lesson.html?course=${courseId}&lesson=${allLessons[index+1].id}` : alert("Done!");
        
        window.prevLesson = () => index > 0 ? 
            window.location.href = `lesson.html?course=${courseId}&lesson=${allLessons[index-1].id}` : alert("Start of course.");
    };

    function showError(msg) {
        document.getElementById("title").innerText = "Error";
        document.getElementById("content").innerHTML = `<p>${msg}</p><a href="index.html">Back Home</a>`;
    }
</script>
</body>
</html>
