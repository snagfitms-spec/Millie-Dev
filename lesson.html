<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson | MillieDev</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= LEVEL 12 LESSON ENGINE ================= */

body {
    background: var(--bg);
    margin: 0;
}

/* TOP NAV BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 5%;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* BACK BUTTON */
.back {
    color: var(--primary);
    cursor: pointer;
    font-weight: 600;
}

/* NAV BUTTONS */
.nav-buttons {
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
}

/* PRIMARY BUTTON */
.primary {
    background: var(--primary);
    color: #0a0f1f;
}

/* CONTENT AREA */
.lesson-wrapper {
    max-width: 900px;
    margin: auto;
    padding: 40px 5%;
}

/* TITLE */
.lesson-title {
    font-size: 2.2rem;
    margin-bottom: 10px;
}

/* BOX */
.lesson-box {
    margin-top: 20px;
    padding: 25px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
}

/* STATUS */
.status {
    margin-top: 15px;
    opacity: 0.7;
    font-size: 0.9rem;
}

</style>

</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

    <div class="back" onclick="goBack()">
        ← Back to Course
    </div>

    <div class="nav-buttons">
        <button onclick="prevLesson()">Prev</button>
        <button onclick="nextLesson()">Next</button>
        <button class="primary" onclick="completeLesson()">Complete</button>
    </div>

</div>

<!-- ================= LESSON CONTENT ================= -->
<div class="lesson-wrapper">

    <h1 class="lesson-title" id="title">Loading...</h1>

    <div class="lesson-box" id="content">
        Loading lesson content...
    </div>

    <div class="status" id="status"></div>

</div>

<script src="coursesData.js"></script>

<script>

/* ================= LEVEL 12 LESSON ENGINE ================= */

const params = new URLSearchParams(window.location.search);

const courseId = params.get("course");
const moduleIndex = parseInt(params.get("m"));
const lessonIndex = parseInt(params.get("l"));

const course = courses[courseId];

if (!course) {

    document.getElementById("title").innerText = "Course Not Found";
    document.getElementById("content").innerText = "Invalid course link.";

} else {

    const module = course.modules[moduleIndex];
    const lesson = module.lessons[lessonIndex];

    document.getElementById("title").innerText = lesson;

    document.getElementById("content").innerHTML = `
        <h3>${module.title}</h3>
        <p style="opacity:0.7; margin-top:10px;">
            ${module.description}
        </p>

        <hr style="margin:20px 0; border:1px solid var(--border);">

        <p>
            📘 Lesson: <strong>${lesson}</strong>
        </p>

        <p style="opacity:0.7; margin-top:10px;">
            This is your learning space. Future upgrades will include videos, quizzes, and interactive coding blocks.
        </p>
    `;

    updateProgress();
    showProgress();
}

/* ================= PROGRESS SYSTEM ================= */

function updateProgress() {

    const key = `progress_${courseId}`;

    let data = JSON.parse(localStorage.getItem(key)) || {};

    data[`${moduleIndex}-${lessonIndex}`] = true;

    localStorage.setItem(key, JSON.stringify(data));
}

/* ================= SHOW PROGRESS ================= */

function showProgress() {

    const key = `progress_${courseId}`;
    const data = JSON.parse(localStorage.getItem(key)) || {};

    const completed = Object.keys(data).length;

    document.getElementById("status").innerText =
        `Progress: ${completed} lesson(s) completed`;
}

/* ================= NAVIGATION ================= */

function nextLesson() {
    window.location.href =
        `lesson.html?course=${courseId}&m=${moduleIndex}&l=${lessonIndex + 1}`;
}

function prevLesson() {
    window.location.href =
        `lesson.html?course=${courseId}&m=${moduleIndex}&l=${lessonIndex - 1}`;
}

/* ================= COMPLETE LESSON ================= */

function completeLesson() {
    alert("Lesson completed ✔");
    updateProgress();
    showProgress();
}

/* ================= BACK ================= */

function goBack() {
    window.location.href = `course.html?id=${courseId}`;
}

</script>

</body>
</html>
