<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MillieDev Admin Dashboard - Layer 2</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= DESIGN SYSTEM ================= */
:root {
    --bg: #0a0f1f;
    --panel: #111a2e;
    --text: #ffffff;
    --muted: #94a3b8;

    --blue: #38BDF8;
    --green: #22C55E;
    --orange: #F59E0B;
    --pink: #FF4FD8;
}

/* ================= BASE ================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ================= TOPBAR ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #0f1629;
    position: sticky;
    top: 0;
}

.logo {
    font-weight: bold;
    color: var(--blue);
}

.menu a {
    color: var(--muted);
    margin-left: 15px;
    text-decoration: none;
    font-size: 14px;
}

/* ================= STATS ================= */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 15px;
}

.card {
    background: var(--panel);
    padding: 14px;
    border-radius: 12px;
}

.icon {
    width: 35px;
    height: 35px;
    border-radius: 10px;
    margin-bottom: 8px;
}

.blue { background: var(--blue); }
.green { background: var(--green); }
.orange { background: var(--orange); }
.pink { background: var(--pink); }

/* ================= REVENUE SECTION ================= */
.revenue-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 15px;
}

/* LEFT - BARS */
.bars {
    background: var(--panel);
    padding: 15px;
    border-radius: 12px;
}

.bar {
    margin-bottom: 14px;
}

.bar-title {
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--muted);
}

.track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 6px;
    border-radius: 10px;
}

/* RIGHT - DONUT */
.donut-box {
    background: var(--panel);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    position: relative;
}

.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.center-text h2 {
    margin: 0;
    color: var(--blue);
}

/* ================= BOOKINGS ================= */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    padding: 15px;
}

.panel {
    background: var(--panel);
    padding: 15px;
    border-radius: 12px;
}

/* ================= MOBILE ================= */
@media (max-width: 900px) {

    .stats {
        grid-template-columns: 1fr 1fr;
    }

    .revenue-wrapper {
        grid-template-columns: 1fr;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="logo">MillieDev Admin</div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Bookings</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </div>
</div>

<!-- STATS -->
<div class="stats">

    <div class="card">
        <div class="icon blue"></div>
        <h3>Total Bookings</h3>
        <p>156</p>
    </div>

    <div class="card">
        <div class="icon pink"></div>
        <h3>Users</h3>
        <p>102</p>
    </div>

    <div class="card">
        <div class="icon green"></div>
        <h3>Revenue</h3>
        <p>$24,780</p>
    </div>

    <div class="card">
        <div class="icon orange"></div>
        <h3>Services</h3>
        <p>4</p>
    </div>

</div>

<!-- REVENUE SECTION (MAIN FIX) -->
<div class="revenue-wrapper">

    <!-- LEFT: BARS -->
    <div class="bars">

        <h3>Service Performance</h3>

        <div class="bar">
            <div class="bar-title">Web Design</div>
            <div class="track"><div class="fill green" style="width:75%"></div></div>
        </div>

        <div class="bar">
            <div class="bar-title">E-commerce</div>
            <div class="track"><div class="fill blue" style="width:60%"></div></div>
        </div>

        <div class="bar">
            <div class="bar-title">Landing Pages</div>
            <div class="track"><div class="fill orange" style="width:45%"></div></div>
        </div>

        <div class="bar">
            <div class="bar-title">Custom Systems</div>
            <div class="track"><div class="fill pink" style="width:80%"></div></div>
        </div>

    </div>

    <!-- RIGHT: DONUT -->
    <div class="donut-box">

        <canvas id="revenueChart"></canvas>

        <div class="center-text">
            <h2>$24,780</h2>
            <p style="color:var(--muted); font-size:12px;">Total Revenue</p>
        </div>

    </div>

</div>

<!-- BOOKINGS -->
<div class="grid">

    <div class="panel">
        <h3>Recent Bookings</h3>
        <div id="cards"></div>
    </div>

    <div class="panel">
        <h3>Booking Trend</h3>
        <p style="opacity:0.6;">(Next upgrade: live chart / trading style graph)</p>
    </div>

</div>

<script>

/* ================= CHART ================= */
const ctx = document.getElementById("revenueChart");

new Chart(ctx, {
    type: "doughnut",
    data: {
        labels: ["Web Design", "E-commerce", "Landing Pages", "Custom"],
        datasets: [{
            data: [75, 60, 45, 80],
            backgroundColor: ["#22C55E", "#38BDF8", "#F59E0B", "#FF4FD8"],
            borderWidth: 0
        }]
    },
    options: {
        cutout: "70%",
        plugins: {
            legend: {
                display: false
            }
        }
    }
});

</script>

</body>
</html>
