<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | MillieDev</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #070A12;
    color: white;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

h1 {
    margin: 0;
}

button {
    background: #6C63FF;
    border: none;
    padding: 10px 15px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #11182a;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.card h3 {
    margin: 0;
}

.card p {
    margin: 5px 0;
    opacity: 0.9;
}

.actions {
    margin-top: 10px;
}

.delete {
    background: #ef4444;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Admin Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div id="bookings">
        Loading bookings...
    </div>

</div>

<script>

const API = "https://millie-dav.onrender.com";
const token = localStorage.getItem("token");

// protect route
if (!token) {
    window.location.href = "login.html";
}

// load bookings
async function loadBookings() {

    try {

        const res = await fetch(`${API}/bookings`, {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await res.json();

        const container = document.getElementById("bookings");

        container.innerHTML = "";

        if (!data.length) {
            container.innerHTML = "<p>No bookings yet.</p>";
            return;
        }

        data.forEach(b => {

            container.innerHTML += `
                <div class="card">
                    <h3>${b.name}</h3>
                    <p><b>Email:</b> ${b.email}</p>
                    <p><b>Service:</b> ${b.service}</p>
                    <p><b>Message:</b> ${b.message}</p>

                    <div class="actions">
                        <button class="delete" onclick="deleteBooking('${b._id}')">
                            Delete
                        </button>
                    </div>
                </div>
            `;
        });

    } catch (err) {
        document.getElementById("bookings").innerHTML =
            "Failed to load bookings.";
    }
}

// delete booking
async function deleteBooking(id) {

    const confirmDelete = confirm("Delete this booking?");

    if (!confirmDelete) return;

    await fetch(`${API}/bookings/${id}`, {
        method: "DELETE",
        headers: {
            Authorization: "Bearer " + token
        }
    });

    loadBookings(); // refresh
}

// logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

loadBookings();

</script>

</body>
</html>
