<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course</title>

<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial; background:#0b0f17; color:white; }

.header {
    text-align:center;
    padding:60px 20px;
}

.header h1 {
    font-size:32px;
    background:linear-gradient(90deg,#38BDF8,#A855F7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.module {
    max-width:800px;
    margin:20px auto;
    background:#111827;
    padding:15px;
    border-radius:12px;
}

.lesson {
    padding:10px;
    margin:5px 0;
    cursor:pointer;
    background:#1f2937;
    border-radius:8px;
}

.lesson:hover {
    background:#38BDF8;
}
</style>
</head>

<body>

<div class="header">
    <h1 id="title">Loading...</h1>
    <p id="desc"></p>
</div>

<div id="container"></div>

<script src="coursesData.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

const course = courses[courseId];

const container = document.getElementById("container");

if(!course){
    document.getElementById("title").innerText = "Course Not Found";
} else {
    document.getElementById("title").innerText = course.title;
    document.getElementById("desc").innerText = course.description;

    course.modules.forEach(m => {
        const div = document.createElement("div");
        div.className = "module";

        div.innerHTML = `<h3>${m.title}</h3>`;

        m.lessons.forEach(l => {
            const lesson = document.createElement("div");
            lesson.className = "lesson";
            lesson.innerText = l.title;

            lesson.onclick = () => {
                window.location.href =
                `lesson.html?course=${courseId}&module=${m.id}&lesson=${l.id}`;
            };

            div.appendChild(lesson);
        });

        container.appendChild(div);
    });
}
</script>

</body>
</html>
