<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course | MillieDev</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
/* ================= LEVEL 11 COURSE VIEWER ================= */

.course-header {
    padding: 80px 5%;
    text-align: center;
}

.course-header h1 {
    font-size: 2.8rem;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.badge {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 12px;
    border-radius: 20px;
    background: rgba(56,189,248,0.1);
    color: var(--primary);
    font-size: 0.85rem;
}

.modules {
    max-width: 900px;
    margin: auto;
    padding: 20px 5%;
}

.module {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 15px;
    overflow: hidden;
    transition: 0.3s ease;
}

.module-header {
    padding: 15px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.module-header:hover {
    background: rgba(255,255,255,0.03);
}

.lessons {
    display: none;
    padding: 10px 20px 20px 20px;
}

.module.active .lessons {
    display: block;
}

.lesson {
    padding: 10px;
    margin: 5px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.02);
}

.lesson:hover {
    background: rgba(56,189,248,0.1);
    color: var(--primary);
}

/* LOADING SCREEN */
#loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
}
</style>

</head>

<body>

<!-- ================= NAV ================= -->
<nav class="navbar">
    <div class="logo">MillieDev</div>
</nav>

<!-- ================= LOADING ================= -->
<div id="loading">
    <div style="
        width:40px;
        height:40px;
        border:3px solid rgba(255,255,255,0.2);
        border-top:3px solid var(--primary);
        border-radius:50%;
        animation:spin 1s linear infinite;
        margin-bottom:15px;
    "></div>
    <p>Loading course...</p>
</div>

<!-- ================= COURSE HEADER ================= -->
<section class="course-header">
    <h1 id="title">Loading...</h1>
    <div class="badge" id="level"></div>
    <p id="desc" style="opacity:0.7; margin-top:10px;"></p>
</section>

<!-- ================= MODULES ================= -->
<section class="modules" id="modules"></section>

<script src="coursesData.js"></script>

<script>

/* ================= GET COURSE ================= */

const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

const course = courses[courseId];

const loading = document.getElementById("loading");
const modulesContainer = document.getElementById("modules");

/* ================= INIT ================= */

window.addEventListener("load", () => {

    if (!course) {
        document.getElementById("title").innerText = "Course Not Found";
        document.getElementById("desc").innerText = "Invalid course selection.";
        loading.style.display = "none";
        return;
    }

    document.getElementById("title").innerText = course.title;
    document.getElementById("level").innerText = course.level;
    document.getElementById("desc").innerText = course.description;

    renderModules();

    setTimeout(() => {
        loading.style.display = "none";
    }, 500);
});

/* ================= RENDER MODULES ================= */

function renderModules() {

    modulesContainer.innerHTML = "";

    course.modules.forEach((module, mIndex) => {

        const div = document.createElement("div");
        div.className = "module";

        div.innerHTML = `
            <div class="module-header">
                <h3>${module.title}</h3>
                <span>▼</span>
            </div>

            <div class="lessons">
                ${module.lessons.map((lesson, lIndex) => `
                    <div class="lesson"
                        onclick="openLesson('${module.id}', '${lesson.id}')">
                        ▶ ${lesson.title}
                    </div>
                `).join("")}
            </div>
        `;

        div.querySelector(".module-header").addEventListener("click", () => {
            div.classList.toggle("active");
        });

        modulesContainer.appendChild(div);
    });
}

/* ================= LESSON NAV ================= */

function openLesson(moduleId, lessonId) {

    window.location.href = 
        `lesson.html?course=${courseId}&module=${moduleId}&lesson=${lessonId}`;
}

</script>

</body>
</html>
