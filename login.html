<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MillieDev Admin Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #070B14;
            color: #E6EDF7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { margin-bottom: 25px; font-weight: 300; }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: linear-gradient(135deg, #38BDF8, #0ea5e9);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        #msg { margin-top: 20px; font-size: 0.9rem; color: #94A3B8; }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<script>
    async function login() {
        const username = document.getElementById("user").value;
        const password = document.getElementById("pass").value;
        const msg = document.getElementById("msg");

        try {
            const res = await fetch("https://millie-dav.onrender.com/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.token) {
                // Store token for your server requests
                localStorage.setItem("token", data.token);
                // Store this for the admin.html 'Security Guard'
                sessionStorage.setItem("loggedIn", "true");

                msg.innerText = "Access granted...";
                
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 800);
            } else {
                msg.innerText = "Invalid credentials";
            }
        } catch (err) {
            msg.innerText = "Server unreachable";
        }
    }
</script>

</body>
</html>
